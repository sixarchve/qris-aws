groups:
  - name: qris_health_alerts
    rules:
      - alert: APIUnreachable
        expr: up{job="qris-backend"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "QRIS Backend API is unreachable"
          description: "Prometheus cannot scrape the API metrics endpoint. Is the golang container running?"

      - alert: ServiceDown
        expr: service_health == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Dependency {{ $labels.service }} is down"
          description: "The API healthcheck reports that {{ $labels.service }} has been unreachable for 1 minute."

      - alert: HighErrorRate
        expr: sum(rate(http_requests_total{status=~"5.."}[1m])) / clamp_min(sum(rate(http_requests_total[1m])), 0.001) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High API error rate detected"
          description: "More than 5% of HTTP requests have returned 5xx errors in the last 2 minutes."

      - alert: SlowAPI
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[1m])) by (le)) > 2.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "API is responding slowly"
          description: "The 95th percentile response time across all endpoints is over 2 seconds."
